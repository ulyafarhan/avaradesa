services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: avaradesa-app:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8080"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-avaradesa}"
      DB_USERNAME: "${DB_USERNAME:-avaradesa_user}"
      DB_PASSWORD: "${DB_PASSWORD:-avaradesa_secret}"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .env:/var/www/html/.env
      - storage-data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-avaradesa}"
      MYSQL_USER: "${DB_USERNAME:-avaradesa_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-avaradesa_secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  redis-data:
  storage-data:
