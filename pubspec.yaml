name: avaradesa_app
description: AvaraDesa Mobile & Desktop Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.2

  # Local Database (Drift)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Key-Value + Secure Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  mockito: ^5.4.6
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
